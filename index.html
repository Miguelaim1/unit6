<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Unit 6 Entertainment Tutor</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #ffffff;
      color: #111;
      margin: 0;
      padding: 0;
      text-align: center;
    }

    .container {
      max-width: 800px;
      margin: 40px auto;
      padding: 0 20px;
    }

    h1 {
      font-size: 32px;
      margin-bottom: 14px;
      letter-spacing: 1px;
    }

    .subtitle {
      font-size: 16px;
      color: #333;
      margin-bottom: 20px;
    }

    #chatBox {
      width: 100%;
      height: 360px;
      border: 1px solid #ccc;
      border-radius: 8px;
      text-align: left;
      padding: 28px 18px;
      box-sizing: border-box;
      overflow-y: auto;
      margin-bottom: 20px;
      font-size: 16px;
      line-height: 1.6;
    }

    .message {
      margin-bottom: 14px;
    }

    .student-a-label {
      color: #1d4ed8;
      font-weight: bold;
    }

    .student-b-label {
      color: #9333ea;
      font-weight: bold;
    }

    .tutor-label {
      color: green;
      font-weight: bold;
    }

    .button-row {
      display: flex;
      justify-content: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .speak-button {
      font-size: 18px;
      padding: 16px 28px;
      border: 1px solid #ccc;
      border-radius: 10px;
      background: white;
      cursor: pointer;
      min-width: 190px;
    }

    .speak-button:hover {
      background: #f5f5f5;
    }

    .speak-button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .active-a {
      background: #dbeafe;
      border-color: #1d4ed8;
    }

    .active-b {
      background: #f3e8ff;
      border-color: #9333ea;
    }

    #status {
      margin-top: 16px;
      font-size: 14px;
      color: #444;
      min-height: 20px;
    }

    .small-note {
      margin-top: 8px;
      font-size: 13px;
      color: #777;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Unit 6 Entertainment Tutor 🎧</h1>
    <div class="subtitle">Two students talk with one AI conversation partner.</div>

    <div id="chatBox">
      <div class="message">
        <span class="tutor-label">Tutor:</span>
        Hi. I’ll join your conversation as the third speaker. Let’s talk about entertainment.
      </div>
    </div>

    <div class="button-row">
      <button id="studentAButton" class="speak-button">🎤 Student A Speak</button>
      <button id="studentBButton" class="speak-button">🎤 Student B Speak</button>
    </div>

    <div id="status">Ready.</div>
    <div class="small-note">Tap your button, speak, then wait. The tutor will answer.</div>
  </div>

  <script>
    const chatBox = document.getElementById("chatBox");
    const studentAButton = document.getElementById("studentAButton");
    const studentBButton = document.getElementById("studentBButton");
    const statusDiv = document.getElementById("status");

    let history = [];
    let recognition = null;
    let isListening = false;
    let isWaiting = false;
    let currentSpeaker = null;

    let finalTranscript = "";
    let latestTranscript = "";
    let silenceTimer = null;
    let hasSubmittedSpeech = false;

    let currentAudio = null;

    // 3000 = wait 3 seconds after the student stops speaking
    const SPEECH_END_DELAY = 3000;

    const personas = [
      {
        name: "Sofia",
        country: "Spain",
        reason: "learning about Japanese pop culture",
        personality: "warm, curious, and talkative",
        likes: "live music, comedy movies, and photography",
        dislikes: "horror movies and crowded trains"
      },
      {
        name: "Liam",
        country: "New Zealand",
        reason: "snowboarding and visiting small towns in Japan",
        personality: "relaxed, friendly, and outdoorsy",
        likes: "rock music, action movies, and mountain towns",
        dislikes: "big crowds and waking up early"
      },
      {
        name: "Maya",
        country: "India",
        reason: "visiting Japanese universities and museums",
        personality: "polite, thoughtful, and a little shy",
        likes: "books, quiet cafes, and animated movies",
        dislikes: "very noisy places and scary movies"
      },
      {
        name: "Noah",
        country: "Germany",
        reason: "traveling around Japan by train",
        personality: "calm, practical, and honest",
        likes: "documentaries, science fiction, and trains",
        dislikes: "being late and expensive restaurants"
      },
      {
        name: "Ava",
        country: "Brazil",
        reason: "learning about Japanese festivals and music",
        personality: "cheerful, energetic, and expressive",
        likes: "dancing, festivals, J-pop, and comedy shows",
        dislikes: "rainy days and quiet parties"
      },
      {
        name: "Ethan",
        country: "South Africa",
        reason: "visiting a friend in Japan",
        personality: "easygoing, funny, and social",
        likes: "sports, games, barbecue, and meeting new people",
        dislikes: "long lines and boring movies"
      },
      {
        name: "Chloe",
        country: "France",
        reason: "learning about Japanese art, fashion, and film",
        personality: "creative, stylish, and observant",
        likes: "museums, fashion, coffee, and romantic comedies",
        dislikes: "bad coffee and loud game centers"
      },
      {
        name: "Omar",
        country: "Egypt",
        reason: "seeing Japanese castles and historical places",
        personality: "curious, calm, and respectful",
        likes: "history, movie soundtracks, and walking tours",
        dislikes: "cold rain and getting lost"
      },
      {
        name: "Ella",
        country: "Finland",
        reason: "experiencing Japanese nature and hot springs",
        personality: "quiet, kind, and thoughtful",
        likes: "reading, relaxing music, and nature videos",
        dislikes: "humid weather and loud restaurants"
      },
      {
        name: "Mateo",
        country: "Mexico",
        reason: "trying Japanese food and meeting local people",
        personality: "funny, social, and adventurous",
        likes: "soccer, karaoke, spicy food, and comedy movies",
        dislikes: "strict schedules and bland food"
      },
      {
        name: "Grace",
        country: "Singapore",
        reason: "shopping, sightseeing, and trying Japanese desserts",
        personality: "friendly, organized, and curious",
        likes: "social media, cafes, anime, and mystery movies",
        dislikes: "messy plans and slow internet"
      },
      {
        name: "Daniel",
        country: "Ireland",
        reason: "playing music and traveling around Japan",
        personality: "funny, relaxed, and talkative",
        likes: "guitar music, pubs, karaoke, and fantasy movies",
        dislikes: "silent rooms and very spicy food"
      }
    ];

    // Choose one random persona when the page loads.
    // This stays the same for this conversation.
    const selectedPersona = personas[Math.floor(Math.random() * personas.length)];

    function setStatus(text) {
      statusDiv.textContent = text;
    }

    function addMessage(role, text) {
      const div = document.createElement("div");
      div.className = "message";

      const label = document.createElement("span");

      if (role === "Student A") {
        label.className = "student-a-label";
        label.textContent = "Student A: ";
      } else if (role === "Student B") {
        label.className = "student-b-label";
        label.textContent = "Student B: ";
      } else {
        label.className = "tutor-label";
        label.textContent = "Tutor: ";
      }

      const content = document.createElement("span");
      content.textContent = text;

      div.appendChild(label);
      div.appendChild(content);

      chatBox.appendChild(div);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    function setButtonsWaiting(waiting) {
      studentAButton.disabled = waiting;
      studentBButton.disabled = waiting;
    }

    function resetButtonStyles() {
      studentAButton.classList.remove("active-a");
      studentBButton.classList.remove("active-b");
      studentAButton.textContent = "🎤 Student A Speak";
      studentBButton.textContent = "🎤 Student B Speak";
    }

    function setActiveSpeakerButton(speaker) {
      resetButtonStyles();

      if (speaker === "Student A") {
        studentAButton.classList.add("active-a");
        studentAButton.textContent = "🛑 Student A Listening...";
      }

      if (speaker === "Student B") {
        studentBButton.classList.add("active-b");
        studentBButton.textContent = "🛑 Student B Listening...";
      }
    }

    async function sendMessage(speaker, userMessage) {
      if (!userMessage || isWaiting) return;

      isWaiting = true;
      setButtonsWaiting(true);
      setStatus("Tutor is thinking...");

      addMessage(speaker, userMessage);

      try {
        const response = await fetch("/api/chat", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({
            history: history,
            message: userMessage,
            speaker: speaker,
            conversationMode: "two_students",
            persona: selectedPersona
          }),
        });

        const data = await response.json();

        if (!response.ok) {
          console.error("API error:", data);
          throw new Error(data.error || "API error");
        }

        const reply = data.reply || data.response || data.message || data.text;

        if (!reply) {
          throw new Error("No tutor reply found.");
        }

        // Store the labeled student message in the conversation history.
        history.push({ role: "user", content: `${speaker}: ${userMessage}` });
        history.push({ role: "assistant", content: reply });

        await showTutorReplyWithVoice(reply);

      } catch (error) {
        console.error("Frontend error:", error);
        addMessage("Tutor", "Sorry, something went wrong.");
        setStatus("Error: " + error.message);
      } finally {
        isWaiting = false;
        setButtonsWaiting(false);
      }
    }

    async function showTutorReplyWithVoice(text) {
      let textShown = false;

      function showTextOnce() {
        if (!textShown) {
          addMessage("Tutor", text);
          textShown = true;
        }
      }

      try {
        setStatus("Preparing voice...");

        if (currentAudio) {
          currentAudio.pause();
          currentAudio = null;
        }

        const response = await fetch("/api/tts", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({ text: text }),
        });

        if (!response.ok) {
          throw new Error("TTS request failed");
        }

        const audioBlob = await response.blob();
        const audioUrl = URL.createObjectURL(audioBlob);

        currentAudio = new Audio(audioUrl);

        currentAudio.onplay = () => {
          showTextOnce();
          setStatus("Speaking...");
        };

        currentAudio.onended = () => {
          setStatus("Ready.");
          URL.revokeObjectURL(audioUrl);
        };

        currentAudio.onerror = () => {
          showTextOnce();
          setStatus("Audio playback error.");
          URL.revokeObjectURL(audioUrl);
        };

        await currentAudio.play();

        setTimeout(showTextOnce, 100);

      } catch (error) {
        console.error("TTS error:", error);
        showTextOnce();
        setStatus("Voice error. Text shown.");
      }
    }

    if ("webkitSpeechRecognition" in window || "SpeechRecognition" in window) {
      const SpeechRecognition =
        window.SpeechRecognition || window.webkitSpeechRecognition;

      recognition = new SpeechRecognition();
      recognition.lang = "en-US";
      recognition.interimResults = true;
      recognition.continuous = true;

      recognition.onstart = () => {
        isListening = true;
        finalTranscript = "";
        latestTranscript = "";
        hasSubmittedSpeech = false;

        if (silenceTimer) {
          clearTimeout(silenceTimer);
        }

        setActiveSpeakerButton(currentSpeaker);
        setStatus(`${currentSpeaker} is speaking...`);
      };

      recognition.onresult = (event) => {
        let interimTranscript = "";

        for (let i = event.resultIndex; i < event.results.length; i++) {
          const transcript = event.results[i][0].transcript;

          if (event.results[i].isFinal) {
            finalTranscript += transcript + " ";
          } else {
            interimTranscript += transcript;
          }
        }

        latestTranscript = (finalTranscript + interimTranscript).trim();

        if (latestTranscript) {
          setStatus(`${currentSpeaker} said: ${latestTranscript}`);
        }

        if (silenceTimer) {
          clearTimeout(silenceTimer);
        }

        silenceTimer = setTimeout(() => {
          finishListeningAndSend();
        }, SPEECH_END_DELAY);
      };

      recognition.onerror = (event) => {
        console.error("Speech recognition error:", event);
        setStatus("Microphone error: " + event.error);
        resetButtonStyles();
      };

      recognition.onend = () => {
        isListening = false;
        resetButtonStyles();

        if (!hasSubmittedSpeech && latestTranscript.trim()) {
          finishListeningAndSend();
        } else if (!latestTranscript.trim() && !isWaiting) {
          setStatus("Ready.");
        }
      };
    } else {
      studentAButton.disabled = true;
      studentBButton.disabled = true;
      studentAButton.textContent = "Mic not supported";
      studentBButton.textContent = "Mic not supported";
      setStatus("Speech recognition is not supported in this browser.");
    }

    function finishListeningAndSend() {
      const transcriptToSend = latestTranscript.trim();

      if (!transcriptToSend || hasSubmittedSpeech || isWaiting || !currentSpeaker) {
        return;
      }

      hasSubmittedSpeech = true;

      if (silenceTimer) {
        clearTimeout(silenceTimer);
      }

      if (recognition && isListening) {
        recognition.stop();
      }

      const speakerToSend = currentSpeaker;

      setStatus(`${speakerToSend} said: ${transcriptToSend}`);

      setTimeout(() => {
        sendMessage(speakerToSend, transcriptToSend);
      }, 300);
    }

    function startListeningForSpeaker(speaker) {
      if (!recognition || isWaiting) return;

      if (currentAudio) {
        currentAudio.pause();
        currentAudio = null;
      }

      if (isListening && currentSpeaker === speaker) {
        finishListeningAndSend();
        return;
      }

      if (isListening && currentSpeaker !== speaker) {
        recognition.stop();
      }

      currentSpeaker = speaker;
      recognition.start();
    }

    studentAButton.addEventListener("click", () => {
      startListeningForSpeaker("Student A");
    });

    studentBButton.addEventListener("click", () => {
      startListeningForSpeaker("Student B");
    });
  </script>
</body>
</html>
