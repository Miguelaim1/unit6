<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3-Person English Conversation Tutor</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #ffffff;
      color: #111;
      margin: 0;
      padding: 0;
      text-align: center;
    }

    .container {
      max-width: 800px;
      margin: 40px auto;
      padding: 0 20px;
    }

    h1 {
      font-size: 32px;
      margin-bottom: 14px;
      letter-spacing: 1px;
    }

    .subtitle {
      font-size: 16px;
      color: #333;
      margin-bottom: 20px;
    }

    #chatBox {
      width: 100%;
      height: 360px;
      border: 1px solid #ccc;
      border-radius: 8px;
      text-align: left;
      padding: 28px 18px;
      box-sizing: border-box;
      overflow-y: auto;
      margin-bottom: 20px;
      font-size: 16px;
      line-height: 1.6;
    }

    .message {
      margin-bottom: 14px;
    }

    .student-a-label {
      color: #1d4ed8;
      font-weight: bold;
    }

    .student-b-label {
      color: #9333ea;
      font-weight: bold;
    }

    .tutor-label {
      color: green;
      font-weight: bold;
    }

    .button-row {
      display: flex;
      justify-content: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .speak-button {
      font-size: 18px;
      padding: 16px 28px;
      border: 1px solid #ccc;
      border-radius: 10px;
      background: white;
      cursor: pointer;
      min-width: 190px;
    }

    .speak-button:hover {
      background: #f5f5f5;
    }

    .speak-button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .active-a {
      background: #dbeafe;
      border-color: #1d4ed8;
    }

    .active-b {
      background: #f3e8ff;
      border-color: #9333ea;
    }

    #status {
      margin-top: 16px;
      font-size: 14px;
      color: #444;
      min-height: 20px;
    }

    .small-note {
      margin-top: 8px;
      font-size: 13px;
      color: #777;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>English Conversation Tutor 🎧</h1>
    <div class="subtitle">Two students talk with one AI conversation partner.</div>

    <div id="chatBox">
      <div class="message">
        <span class="tutor-label">Tutor:</span>
        Hi. I’ll join your conversation as the third speaker.
      </div>
    </div>

    <div class="button-row">
      <button id="studentAButton" class="speak-button">🎤 Student A Speak</button>
      <button id="studentBButton" class="speak-button">🎤 Student B Speak</button>
    </div>

    <div id="status">Ready.</div>
    <div class="small-note">Tap your button, speak, then wait. The tutor will answer.</div>
  </div>

  <script>
    const chatBox = document.getElementById("chatBox");
    const studentAButton = document.getElementById("studentAButton");
    const studentBButton = document.getElementById("studentBButton");
    const statusDiv = document.getElementById("status");

    let history = [];
    let recognition = null;
    let isListening = false;
    let isWaiting = false;
    let currentSpeaker = null;

    let finalTranscript = "";
    let latestTranscript = "";
    let silenceTimer = null;
    let hasSubmittedSpeech = false;

    let currentAudio = null;

    // 3000 = wait 3 seconds after the student stops speaking
    const SPEECH_END_DELAY = 3000;

    function setStatus(text) {
      statusDiv.textContent = text;
    }

    function addMessage(role, text) {
      const div = document.createElement("div");
      div.className = "message";

      const label = document.createElement("span");

      if (role === "Student A") {
        label.className = "student-a-label";
        label.textContent = "Student A: ";
      } else if (role === "Student B") {
        label.className = "student-b-label";
        label.textContent = "Student B: ";
      } else {
        label.className = "tutor-label";
        label.textContent = "Tutor: ";
      }

      const content = document.createElement("span");
      content.textContent = text;

      div.appendChild(label);
      div.appendChild(content);

      chatBox.appendChild(div);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    function setButtonsWaiting(waiting) {
      studentAButton.disabled = waiting;
      studentBButton.disabled = waiting;
    }

    function resetButtonStyles() {
      studentAButton.classList.remove("active-a");
      studentBButton.classList.remove("active-b");
      studentAButton.textContent = "🎤 Student A Speak";
      studentBButton.textContent = "🎤 Student B Speak";
    }

    function setActiveSpeakerButton(speaker) {
      resetButtonStyles();

      if (speaker === "Student A") {
        studentAButton.classList.add("active-a");
        studentAButton.textContent = "🛑 Student A Listening...";
      }

      if (speaker === "Student B") {
        studentBButton.classList.add("active-b");
        studentBButton.textContent = "🛑 Student B Listening...";
      }
    }

    function getSessionId() {
  let id = localStorage.getItem("conversationSessionId");

  if (!id) {
    id = crypto.randomUUID();
    localStorage.setItem("conversationSessionId", id);
  }

  return id;
}
    
    async function sendMessage(speaker, userMessage) {
      if (!userMessage || isWaiting) return;

      isWaiting = true;
      setButtonsWaiting(true);
      setStatus("Tutor is thinking...");

      addMessage(speaker, userMessage);

      try {
        const response = await fetch("/api/chat", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({
            history,

            // This makes the current speaker clear to the chatbot.
            message: `${speaker}: ${userMessage}`,

            // This is useful if you update chat.js later to read speaker directly.
            speaker: speaker,

            // Optional: tells the backend this is a 2-student conversation.
            conversationMode: "two_students",

            // This keeps the same random persona during the conversation.
            sessionId: getSessionId(),
          }),
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || "API error");
        }

        const reply = data.reply || data.response || data.message || data.text;

        if (!reply) {
          throw new Error("No tutor reply found.");
        }

        // Store the labeled student message in the conversation history.
        history.push({ role: "user", content: `${speaker}: ${userMessage}` });
        history.push({ role: "assistant", content: reply });

        await showTutorReplyWithVoice(reply);

      } catch (error) {
        console.error(error);
        addMessage("Tutor", "Sorry, something went wrong.");
        setStatus("Error.");
      } finally {
        isWaiting = false;
        setButtonsWaiting(false);
      }
    }

    async function showTutorReplyWithVoice(text) {
      let textShown = false;

      function showTextOnce() {
        if (!textShown) {
          addMessage("Tutor", text);
          textShown = true;
        }
      }

      try {
        setStatus("Preparing voice...");

        if (currentAudio) {
          currentAudio.pause();
          currentAudio = null;
        }

        const response = await fetch("/api/tts", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({ text }),
        });

        if (!response.ok) {
          throw new Error("TTS request failed");
        }

        const audioBlob = await response.blob();
        const audioUrl = URL.createObjectURL(audioBlob);

        currentAudio = new Audio(audioUrl);

        currentAudio.onplay = () => {
          showTextOnce();
          setStatus("Speaking...");
        };

        currentAudio.onended = () => {
          setStatus("Ready.");
          URL.revokeObjectURL(audioUrl);
        };

        currentAudio.onerror = () => {
          showTextOnce();
          setStatus("Audio playback error.");
          URL.revokeObjectURL(audioUrl);
        };

        await currentAudio.play();

        // Backup in case onplay is slow
        setTimeout(showTextOnce, 100);

      } catch (error) {
        console.error("TTS error:", error);

        // If voice fails, still show the tutor text.
        showTextOnce();
        setStatus("Voice error. Text shown.");
      }
    }

    if ("webkitSpeechRecognition" in window || "SpeechRecognition" in window) {
      const SpeechRecognition =
        window.SpeechRecognition || window.webkitSpeechRecognition;

      recognition = new SpeechRecognition();
      recognition.lang = "en-US";
      recognition.interimResults = true;
      recognition.continuous = true;

      recognition.onstart = () => {
        isListening = true;
        finalTranscript = "";
        latestTranscript = "";
        hasSubmittedSpeech = false;

        if (silenceTimer) {
          clearTimeout(silenceTimer);
        }

        setActiveSpeakerButton(currentSpeaker);
        setStatus(`${currentSpeaker} is speaking...`);
      };

      recognition.onresult = (event) => {
        let interimTranscript = "";

        for (let i = event.resultIndex; i < event.results.length; i++) {
          const transcript = event.results[i][0].transcript;

          if (event.results[i].isFinal) {
            finalTranscript += transcript + " ";
          } else {
            interimTranscript += transcript;
          }
        }

        latestTranscript = (finalTranscript + interimTranscript).trim();

        if (latestTranscript) {
          setStatus(`${currentSpeaker} said: ${latestTranscript}`);
        }

        if (silenceTimer) {
          clearTimeout(silenceTimer);
        }

        silenceTimer = setTimeout(() => {
          finishListeningAndSend();
        }, SPEECH_END_DELAY);
      };

      recognition.onerror = (event) => {
        console.error("Speech recognition error:", event);
        setStatus("Microphone error: " + event.error);
        resetButtonStyles();
      };

      recognition.onend = () => {
        isListening = false;
        resetButtonStyles();

        if (!hasSubmittedSpeech && latestTranscript.trim()) {
          finishListeningAndSend();
        } else if (!latestTranscript.trim() && !isWaiting) {
          setStatus("Ready.");
        }
      };
    } else {
      studentAButton.disabled = true;
      studentBButton.disabled = true;
      studentAButton.textContent = "Mic not supported";
      studentBButton.textContent = "Mic not supported";
      setStatus("Speech recognition is not supported in this browser.");
    }

    function finishListeningAndSend() {
      const transcriptToSend = latestTranscript.trim();

      if (!transcriptToSend || hasSubmittedSpeech || isWaiting || !currentSpeaker) {
        return;
      }

      hasSubmittedSpeech = true;

      if (silenceTimer) {
        clearTimeout(silenceTimer);
      }

      if (recognition && isListening) {
        recognition.stop();
      }

      const speakerToSend = currentSpeaker;

      setStatus(`${speakerToSend} said: ${transcriptToSend}`);

      setTimeout(() => {
        sendMessage(speakerToSend, transcriptToSend);
      }, 300);
    }

    function startListeningForSpeaker(speaker) {
      if (!recognition || isWaiting) return;

      if (currentAudio) {
        currentAudio.pause();
        currentAudio = null;
      }

      // If already listening and the same speaker presses again, stop and send.
      if (isListening && currentSpeaker === speaker) {
        finishListeningAndSend();
        return;
      }

      // If already listening but the other speaker presses, stop first.
      if (isListening && currentSpeaker !== speaker) {
        recognition.stop();
      }

      currentSpeaker = speaker;
      recognition.start();
    }

    studentAButton.addEventListener("click", () => {
      startListeningForSpeaker("Student A");
    });

    studentBButton.addEventListener("click", () => {
      startListeningForSpeaker("Student B");
    });
  </script>
</body>
</html>
